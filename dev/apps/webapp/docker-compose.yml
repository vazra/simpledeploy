services:
    app:
        image: nginx:alpine
        labels:
            simpledeploy.domain: webapp.localhost
            simpledeploy.port: '80'
            simpledeploy.endpoints.0.domain: myapp.com
            simpledeploy.endpoints.0.port: "80"
            simpledeploy.endpoints.0.tls: off
        depends_on:
            - db
        restart: unless-stopped
    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: webapp
            POSTGRES_USER: webapp
            POSTGRES_PASSWORD: devpassword
        volumes:
            - pgdata:/var/lib/postgresql/data
        labels:
            simpledeploy.backup.strategy: postgres
            simpledeploy.backup.schedule: 0 2 * * *
            simpledeploy.backup.target: local
            simpledeploy.backup.retention: '7'
        restart: unless-stopped
volumes:
    pgdata: null
