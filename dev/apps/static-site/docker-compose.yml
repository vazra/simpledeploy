services:
    web:
        image: nginx:1.27-alpine
        restart: unless-stopped
        volumes:
            - web-content:/usr/share/nginx/html:ro
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 128M
        healthcheck:
            test:
                - CMD
                - wget
                - '-qO-'
                - http://localhost/
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
        labels:
            simpledeploy.alert.cpu: '80'
            simpledeploy.alert.memory: '85'
            simpledeploy.backup.strategy: volume
            simpledeploy.backup.schedule: 0 3 * * *
            simpledeploy.backup.target: local
            simpledeploy.backup.retention: '7'
            simpledeploy.endpoints.0.domain: static.mac
            simpledeploy.endpoints.0.port: "80"
            simpledeploy.endpoints.0.tls: local
        networks:
            - simpledeploy-public
volumes:
    web-content: {}
networks:
    simpledeploy-public:
        external: true
        name: simpledeploy-public
