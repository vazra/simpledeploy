services:
  co:
    image: datafi.azurecr.io/co:latest
    container_name: datafi-co
    ports:
      - "8000:8000"
      - "8001:8001"
      - "50051:50051"
    environment:
      GLOBAL_COORDINATOR: "https://co-global.api.home.datafi.us"
      # --- Local Redis Connection Base64 ---
      KEYVAL: "eyJraW5kIjoicmVkaXMiLCJhZGRyIjoicmVkaXM6NjM3OSIsInVzZXJuYW1lIjoiZGVmYXVsdCIsInBhc3N3b3JkIjoicHdkIn0="

      # --- Local MinIO (S3-compatible) ---
      PARQUET_STORAGE: "eyJhbWF6b25TMyI6eyJyZWdpb24iOiJ1cy1lYXN0LTEiLCJhY2Nlc3NLZXlJZCI6Im1pbmlvYWRtaW4iLCJzZWNyZXRBY2Nlc3NLZXkiOiJtaW5pb2FkbWluIiwiYnVja2V0TmFtZSI6ImRhdGFmaS1sb2NhbC1wYXJxdWV0IiwiZW5kcG9pbnQiOiJodHRwOi8vbWluaW86OTAwMCIsImZvcmNlUGF0aFN0eWxlIjp0cnVlfX0="
      PARQUET_AWS_ACCESS_KEY_ID: "minioadmin"
      PARQUET_AWS_SECRET_ACCESS_KEY: "minioadmin"
      PARQUET_AWS_REGION: "us-east-1"
      PARQUET_BUCKET: "datafi-local-parquet"
      DOCUMENT_BUCKET: "datafi-local-document"

      # --- Internal service routing ---
      PARQUET_CONNECTOR_URL: "http://ed:80"
      CACHE_ENABLED: "false"
      DISABLE_SSL: "true"
      EMAIL_FROM: "Name <name@example.com>"
      EMAIL_CONNECTION_URL: "smtps://user:pass@email-smtp.your-email-provider.com"

      # --- Cloudflare (for document uploads) ---
      CLOUDFLARE_ACCOUNT_ID: "<REPLACE_CLOUDFLARE_ACCOUNT_ID>"
      CLOUDFLARE_TOKEN: "<REPLACE_CLOUDFLARE_TOKEN>"

      # --- Token verification ---
      TOKEN_ISSUER: "https://cognito-idp.us-west-2.amazonaws.com/us-west-2_FDV8RBt3G"

      # --- JWT : Create from https://utils.datafi.dev/jwt-keys ---
      JWT_KID: "4bc8bf6b-9e7b-4fdc-a74a-e16a38e63c14"
      JWT_ISS: "http://ed.local.datafi.us"
      JWT_KEY: ""

    restart: unless-stopped
    depends_on:
      - redis
      - minio
      - ed
    networks:
      - datafi-local

  ed:
    image: datafi/es:next
    container_name: datafi-ed
    ports:
      - "8080:80"
      - "50052:50051"
    environment:
      LOG_LEVEL: "INFO"
      DISABLE_SSL: "true"
      EDGE_KEY: ""

      # --- Local MinIO (S3-compatible) ---
      JWT_JWKS: ""
      PARQUET_STORAGE: eyJhbWF6b25TMyI6eyJyZWdpb24iOiJ1cy1lYXN0LTEiLCJhY2Nlc3NLZXlJZCI6Im1pbmlvYWRtaW4iLCJzZWNyZXRBY2Nlc3NLZXkiOiJtaW5pb2FkbWluIiwiYnVja2V0TmFtZSI6ImRhdGFmaS1sb2NhbC1wYXJxdWV0IiwiZW5kcG9pbnQiOiJodHRwOi8vbWluaW86OTAwMCIsImZvcmNlUGF0aFN0eWxlIjp0cnVlfX0=
    restart: unless-stopped
    depends_on:
      - minio
    networks:
      - datafi-local

  redis:
    image: redis/redis-stack-server:latest
    container_name: datafi-redis
    environment:
      REDIS_ARGS: "--requirepass pwd"
    volumes:
      - redis_data:/data
    ports:
      - "16379:6379"
    restart: unless-stopped
    networks:
      - datafi-local

  minio:
    image: minio/minio:latest
    container_name: datafi-minio
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datafi-local

  minio-init:
    image: minio/mc:latest
    container_name: datafi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/datafi-local-parquet;
      mc mb --ignore-existing local/datafi-local-document;
      echo 'Buckets created successfully';
      "
    networks:
      - datafi-local

  redisinsight:
    image: redis/redisinsight:latest
    container_name: datafi-redisinsight
    volumes:
      - redisinsight_data:/data
    ports:
      - "5540:5540"
    restart: unless-stopped
    networks:
      - datafi-local

volumes:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  redisinsight_data:

networks:
  datafi-local:
    driver: bridge
