name: Templates

# Validate every app template by deploying it end-to-end. Triggered only
# when template definitions change, so it runs once per template-edit PR
# instead of on every push. Also exposed as a manual workflow_dispatch.
on:
  pull_request:
    paths:
      - 'ui/src/lib/appTemplates.js'
      - 'ui/src/lib/serviceTemplates.js'
      - 'e2e/tests/templates-deploy-all.spec.js'
      - 'e2e/tests/00-template-images.spec.js'
  push:
    branches: [main]
    paths:
      - 'ui/src/lib/appTemplates.js'
      - 'ui/src/lib/serviceTemplates.js'
      - 'e2e/tests/templates-deploy-all.spec.js'
      - 'e2e/tests/00-template-images.spec.js'
  workflow_dispatch:

concurrency:
  group: templates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-all:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Authenticate the docker daemon to GHCR so deploy-time `docker
      # compose pull` can fetch mirrored (private-by-default) packages.
      - name: Log in to GHCR for mirror pulls
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
      # Route template pulls through our GHCR mirror to avoid Docker Hub
      # pull rate limits. The mirror-images workflow populates GHCR on
      # the same triggers as this one; bootstrap with `gh workflow run
      # mirror-images.yml` before first use or after a long gap.
      - run: make e2e-templates
        env:
          E2E_USE_MIRROR: '1'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: templates-playwright-report
          path: e2e/playwright-report/
          retention-days: 14
