name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make ui-build
      - uses: golangci/golangci-lint-action@v7
        with:
          # golangci-lint v2 is required because go.mod targets go1.26
          # and the last v1 release (v1.64.8) was built with go1.24.
          # The v6 action doesn't understand v2 version strings; keep the
          # action version in sync with the CLI version.
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make ui-build
      - run: go test -race ./...

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: cd ui && npm ci && npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build

  e2e:
    if: github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Authenticate the docker daemon to GHCR so deploy-time `docker
      # compose pull` can fetch mirrored (private-by-default) packages.
      - name: Log in to GHCR for mirror pulls
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
      # Pull template/fixture images via the GHCR mirror to avoid
      # Docker Hub pull rate limits on shared CI runners. Populated by
      # .github/workflows/mirror-images.yml.
      - run: make e2e
        env:
          E2E_USE_MIRROR: '1'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
