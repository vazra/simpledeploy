name: e2e-minimal

# Temporary workflow to verify the deploy-race fix with a minimal spec chain
# before merging to main. Runs only on this branch; remove before merge.
on:
  push:
    branches: [fix/deploy-race]
  workflow_dispatch:

jobs:
  e2e-min:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: build binary
        run: make build

      - name: install e2e deps + browsers
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: run minimal e2e (setup + deploy + cleanup)
        run: |
          cd e2e
          npx playwright test 01-setup.spec.js 03-deploy.spec.js 19-cleanup.spec.js --reporter=list

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-minimal-report
          path: e2e/playwright-report/
          retention-days: 7
