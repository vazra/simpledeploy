      summary: Get the scheduled DB backup config
      responses:
        '200':
          description: Config.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
    post:
      tags: [system]
      summary: Set the scheduled DB backup config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                schedule: { type: string, description: 'Cron expression.' }
                destination: { type: string, description: 'Filesystem path.' }
                compact: { type: boolean }
                retention: { type: integer }
      responses:
        '200':
          description: Saved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }
  /system/backup/runs:
    get:
      tags: [system]
      summary: List recent scheduled DB backup runs
      responses:
        '200':
          description: Runs.
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie set by `POST /auth/login`. Carries a JWT.
    apiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: 'sd_<token>'
      description: Personal API key. Created via `POST /apikeys`.
  parameters:
    AppSlug:
      in: path
      name: slug
      required: true
      schema: { type: string }
      description: App slug (lowercase, dash-separated).
    IdParam:
      in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
    SinceParam:
      in: query
      name: since
      required: false
      schema: { type: string }
      description: 'ISO-8601 timestamp or duration like 1h, 24h, 7d.'
  responses:
    BadRequest:
      description: Invalid request.
      content:
        text/plain:
          schema: { type: string }
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        text/plain:
          schema: { type: string }
    Forbidden:
      description: Authenticated but not allowed.
      content:
        text/plain:
          schema: { type: string }
    NotFound:
      description: Resource not found.
      content:
        text/plain:
          schema: { type: string }
    Conflict:
      description: State conflict.
      content:
        text/plain:
          schema: { type: string }
    TooManyRequests:
      description: Rate limited or locked out.
      content:
        text/plain:
          schema: { type: string }
  schemas:
    StatusOk:
      type: object
      properties:
        status: { type: string, example: ok }
    Error:
      type: object
      properties:
        error: { type: string }
    App:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        compose_path: { type: string }
        status: { type: string, example: running }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AppDetail:
      allOf:
        - $ref: '#/components/schemas/App'
        - type: object
          properties:
            deploying: { type: boolean }
            Labels:
              type: object
              additionalProperties: { type: string }
            endpoints:
              type: array
              items: { $ref: '#/components/schemas/Endpoint' }
    Service:
      type: object
      properties:
        name: { type: string }
        image: { type: string }
        state: { type: string, example: running }
        status: { type: string }
        ports:
          type: array
          items: { type: string }
        replicas: { type: integer }
    Endpoint:
      type: object
      properties:
        domain: { type: string }
        port: { type: string }
        tls: { type: string, description: 'auto, off, internal, or path to a stored cert.' }
        service: { type: string }
    BackupConfig:
      type: object
      properties:
        id: { type: integer, format: int64 }
        app_id: { type: integer, format: int64 }
        name: { type: string }
        strategy: { type: string, example: postgres }
        strategy_config_json: { type: string }
        target: { type: string, example: s3 }
        target_config_json: { type: string }
        schedule_cron: { type: string }
        retention_count: { type: integer }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
    BackupRun:
      type: object
      properties:
        id: { type: integer, format: int64 }
        backup_config_id: { type: integer, format: int64 }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        status: { type: string, example: success }
        size_bytes: { type: integer, format: int64 }
        file_path: { type: string }
        error: { type: string }
    AlertRule:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        scope: { type: string, description: 'system, app, or webhook' }
        target: { type: string, description: 'App slug or "*".' }
        metric: { type: string }
        operator: { type: string, enum: ['>', '<', '>=', '<=', '==', '!='] }
        threshold: { type: number }
        duration_seconds: { type: integer }
        webhook_ids:
          type: array
          items: { type: integer, format: int64 }
        enabled: { type: boolean }
    Webhook:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        url: { type: string, format: uri }
        kind: { type: string, description: 'generic, slack, or discord' }
        secret: { type: string }
        enabled: { type: boolean }
    User:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        role: { type: string, enum: [super_admin, admin, user] }
        display_name: { type: string }
        email: { type: string, format: email }
        created_at: { type: string, format: date-time }
    ApiKey:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
    Registry:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        registry: { type: string, example: ghcr.io }
        username: { type: string }
        password: { type: string, description: 'Write-only; never returned.' }
        created_at: { type: string, format: date-time }
    MetricsPoint:
      type: object
      properties:
        ts: { type: string, format: date-time }
        cpu_percent: { type: number }
        memory_bytes: { type: integer, format: int64 }
        memory_limit: { type: integer, format: int64 }
        rx_bytes: { type: integer, format: int64 }
        tx_bytes: { type: integer, format: int64 }
    RequestStat:
      type: object
      properties:
        ts: { type: string, format: date-time }
        path: { type: string }
        method: { type: string }
        status: { type: integer }
        count: { type: integer, format: int64 }
        latency_ms_p50: { type: number }
        latency_ms_p95: { type: number }
