      responses:
        '200':
          description: Pruned.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /system/vacuum:
    post:
      tags: [system]
      summary: Run SQLite VACUUM (super admin)
      responses:
        '200':
          description: Result.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /system/backup/download:
    post:
      tags: [system]
      summary: Stream a one-shot SQLite backup
      description: |
        Runs `VACUUM INTO` to a temporary file then streams it. When `compact=true`,
        metrics and request stats tables are stripped before download.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                compact: { type: boolean, default: false }
      responses:
        '200':
          description: SQLite database bytes.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
  /system/backup/config:
    get:
