      responses:
        '200':
          description: Pruned.
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /system/prune/request-stats:
    post:
      tags: [system]
      summary: Delete old request stats (super admin)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
