openapi: 3.1.0
info:
  title: SimpleDeploy REST API
  version: 1.2.0
  summary: Single-binary Docker Compose deployer with proxy, backups, alerts, and metrics.
  description: |
    The SimpleDeploy HTTP API drives the dashboard UI and exposes every operation
    available in the CLI. All endpoints are mounted under the `/api` prefix.

    ## Authentication

    There are two ways to call the API:

    - **Session cookie** (`session`): set by `POST /auth/login` for browser clients.
      The cookie carries a JWT and is `HttpOnly`, `SameSite=Strict` (or `Lax` when
      TLS is off).
    - **API key bearer** (`Authorization: Bearer sd_...`): create at
      `POST /apikeys`. API keys belong to a user and inherit that user's role and
      per-app access grants.

    Most endpoints accept either auth method. A handful of dashboard-only routes
    require a real session.

    ## App scope

    Every app-scoped path is gated by an "app access" middleware. Super admins
    and admins can reach any app. Regular users only see apps explicitly granted
    to them via `POST /users/{id}/access`.

    ## Errors

    Errors are returned as `text/plain` with a one-line, generic message and the
    appropriate HTTP status. The detailed reason is logged server-side, never
    returned to the client. Treat any non-2xx status as a failure.
  license:
    name: MIT
    identifier: MIT
    url: https://github.com/vazra/simpledeploy/blob/main/LICENSE
  contact:
    name: SimpleDeploy on GitHub
    url: https://github.com/vazra/simpledeploy
servers:
  - url: https://your-server.example/api
    description: Replace with your server URL.

tags:
  - name: auth
    description: Login, logout, first-time setup, health.
  - name: apps
    description: List, inspect, deploy, validate, and remove compose apps.
  - name: app-actions
    description: Lifecycle actions (start, stop, restart, pull, scale, cancel) and config (env, services, compose).
  - name: endpoints
    description: HTTPS endpoints, custom certs, and IP allowlists per app.
  - name: deploy-history
    description: Compose version history, rollback, restore, download.
  - name: users
    description: User CRUD and per-app access grants (super admin).
  - name: profile
    description: Current user profile and password.
  - name: apikeys
    description: Personal API keys for the current user.
  - name: metrics
    description: System and per-app CPU, memory, network, request stats.
  - name: logs
    description: Container logs and deploy logs (WebSocket, see WebSocket reference).
  - name: backups
    description: App backup configs, runs, restores, S3/local targets, summary.
  - name: webhooks
    description: Outgoing webhook endpoints for alerts and events.
  - name: alerts
    description: Alert rules and history.
  - name: registries
    description: Private container registry credentials.
  - name: docker
    description: Host Docker info, images, networks, volumes, prune.
  - name: system
    description: Host info, audit log, vacuum, prune, process logs, DB backup.
  - name: tls
    description: Local CA certificate distribution.

security:
  - sessionAuth: []
  - apiKeyAuth: []

paths:
  /health:
    get:
      tags: [auth]
      summary: Liveness probe
      description: Always returns 200 with a constant body. Safe for load balancers.
      security: []
      responses:
        '200':
          description: Server is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /setup/status:
    get:
      tags: [auth]
      summary: Whether first-time setup is required
      description: 'Returns `needs_setup: true` until the first super admin account exists.'
      security: []
      responses:
        '200':
          description: Setup status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  needs_setup: { type: boolean }
  /setup:
    post:
      tags: [auth]
      summary: Create the initial super admin
      description: Allowed only when no users exist. Returns 409 once set up.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, minLength: 8 }
                display_name: { type: string }
                email: { type: string, format: email }
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  username: { type: string }
                  role: { type: string, example: super_admin }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /auth/login:
    post:
      tags: [auth]
      summary: Log in with username and password
      description: |
        Validates credentials and sets the `session` cookie. Subject to per-IP
        rate limiting and per-user/per-IP lockout.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login succeeded; `session` cookie set.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly session cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  username: { type: string }
                  role: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/logout:
    post:
      tags: [auth]
      summary: Clear the session cookie
      responses:
        '200':
          description: Cookie cleared.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }

  /tls/ca.crt:
    get:
      tags: [tls]
      summary: Download the local CA certificate
      description: |
        Returns the SimpleDeploy local CA certificate in PEM format when the
        server is running with self-signed TLS. Used by the Trust page so users
        can install the CA on their device.
      security: []
      responses:
        '200':
          description: PEM-encoded certificate.
          content:
            application/x-x509-ca-cert:
              schema: { type: string, format: binary }
            application/x-pem-file:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /apps:
    get:
      tags: [apps]
      summary: List all apps the caller can see
      responses:
        '200':
          description: Apps array (filtered by per-user access).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/App' }

  /apps/{slug}:
    parameters:
      - $ref: '#/components/parameters/AppSlug'
    get:
      tags: [apps]
      summary: Get one app with labels and endpoints
      responses:
        '200':
          description: App detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [apps]
      summary: Remove an app
      description: Stops containers and deletes the app directory.
      responses:
        '200':
          description: Removed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }
        '404': { $ref: '#/components/responses/NotFound' }

  /apps/deploy:
    post:
      tags: [apps]
      summary: Create or update an app from a docker-compose.yml
      description: |
        Writes the compose file under the apps directory and triggers a deploy.
        Use `validate-compose` first to catch label or syntax errors.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, compose]
              properties:
                name: { type: string, description: 'App name (becomes the slug).' }
                compose: { type: string, description: 'Full docker-compose.yml content.' }
                env: { type: string, description: 'Optional .env file content.' }
      responses:
        '202':
          description: Deploy accepted; watch progress via the deploy logs WebSocket.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slug: { type: string }
                  status: { type: string, example: deploying }
        '400': { $ref: '#/components/responses/BadRequest' }

  /apps/validate-compose:
    post:
      tags: [apps]
      summary: Validate compose YAML and labels without deploying
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compose]
              properties:
                compose: { type: string }
      responses:
        '200':
          description: Validation result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  errors:
                    type: array
                    items: { type: string }
                  warnings:
                    type: array
                    items: { type: string }

  /apps/{slug}/restart:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    post:
      tags: [app-actions]
      summary: Restart all services for an app
      responses:
        '202': { description: Restart accepted. }
        '404': { $ref: '#/components/responses/NotFound' }
  /apps/{slug}/stop:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    post:
      tags: [app-actions]
      summary: Stop all services for an app
      responses:
        '202': { description: Stop accepted. }
  /apps/{slug}/start:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    post:
      tags: [app-actions]
      summary: Start (after stop) all services for an app
      responses:
        '202': { description: Start accepted. }
  /apps/{slug}/pull:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    post:
      tags: [app-actions]
      summary: Pull latest images then redeploy
      responses:
        '202': { description: Pull accepted. }
  /apps/{slug}/scale:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    post:
      tags: [app-actions]
      summary: Scale a service up or down
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service, replicas]
              properties:
                service: { type: string }
                replicas: { type: integer, minimum: 0 }
      responses:
        '202': { description: Scale accepted. }
        '400': { $ref: '#/components/responses/BadRequest' }
  /apps/{slug}/cancel:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    post:
      tags: [app-actions]
      summary: Cancel an in-flight deploy
      responses:
        '200':
          description: Cancellation requested.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }

  /apps/{slug}/services:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    get:
      tags: [app-actions]
      summary: List running containers for an app
      responses:
        '200':
          description: Service status.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Service' }
  /apps/{slug}/env:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    get:
      tags: [app-actions]
      summary: Get the .env file for an app
      responses:
        '200':
          description: Env content.
          content:
            application/json:
              schema:
                type: object
                properties:
                  env: { type: string }
    put:
      tags: [app-actions]
      summary: Replace the .env file for an app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [env]
              properties:
                env: { type: string }
      responses:
        '200':
          description: Env saved (does not redeploy).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }

  /apps/{slug}/compose:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    get:
      tags: [app-actions]
      summary: Get the docker-compose.yml for an app
      responses:
        '200':
          description: Compose YAML.
          content:
            application/json:
              schema:
                type: object
                properties:
                  compose: { type: string }

  /apps/{slug}/endpoints:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    put:
      tags: [endpoints]
      summary: Replace the list of HTTPS endpoints for an app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoints]
              properties:
                endpoints:
                  type: array
                  items: { $ref: '#/components/schemas/Endpoint' }
      responses:
        '200':
          description: Endpoints saved and proxy reconfigured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }

  /apps/{slug}/access:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    put:
      tags: [endpoints]
      summary: Update IP access list and rate limits for an app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                allow:
                  type: array
                  items: { type: string }
                  description: CIDRs allowed to reach the app.
                deny:
                  type: array
                  items: { type: string }
                rate_limit:
                  type: object
                  properties:
                    requests_per_minute: { type: integer }
                    burst: { type: integer }
      responses:
        '200':
          description: Access rules saved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }

  /apps/{slug}/certs/{domain}:
    parameters:
      - $ref: '#/components/parameters/AppSlug'
      - in: path
        name: domain
        required: true
        schema: { type: string }
    put:
      tags: [endpoints]
      summary: Upload a custom TLS certificate for a domain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cert, key]
              properties:
                cert: { type: string, description: 'PEM certificate chain.' }
                key: { type: string, description: 'PEM private key.' }
      responses:
        '200':
          description: Certificate stored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }
        '400': { $ref: '#/components/responses/BadRequest' }
    delete:
      tags: [endpoints]
      summary: Remove a custom TLS certificate
      responses:
        '200':
          description: Certificate removed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }

  /apps/{slug}/versions:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    get:
      tags: [deploy-history]
      summary: List compose versions for an app (newest first)
      responses:
        '200':
          description: Version list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DeployVersion' }
  /apps/{slug}/rollback:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    post:
      tags: [deploy-history]
      summary: Roll back to a previous compose version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version_id]
              properties:
                version_id: { type: integer, format: int64 }
      responses:
        '202':
          description: Rollback accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }
  /apps/{slug}/versions/{id}:
    parameters:
      - $ref: '#/components/parameters/AppSlug'
      - $ref: '#/components/parameters/IdParam'
    put:
      tags: [deploy-history]
      summary: Edit metadata (name, notes, env snapshot) for a version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                notes: { type: string }
                env_snapshot: { type: string }
      responses:
        '200':
          description: Updated version.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeployVersion' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [deploy-history]
      summary: Delete a stored compose version
      responses:
        '204': { description: Deleted. }
        '404': { $ref: '#/components/responses/NotFound' }
  /apps/{slug}/versions/{id}/download:
    parameters:
      - $ref: '#/components/parameters/AppSlug'
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [deploy-history]
      summary: Download the compose YAML for a version
      responses:
        '200':
          description: Raw compose file.
          content:
            text/yaml:
              schema: { type: string }
  /apps/{slug}/versions/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/AppSlug'
      - $ref: '#/components/parameters/IdParam'
    post:
      tags: [deploy-history]
      summary: Replace the live compose with a stored version and redeploy
      responses:
        '202':
          description: Restore accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: restoring }
  /apps/{slug}/events:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    get:
      tags: [deploy-history]
      summary: List deploy events for an app
      responses:
        '200':
          description: Events array.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DeployEvent' }

  /users:
    get:
      tags: [users]
      summary: List all users (super admin or admin)
      responses:
        '200':
          description: Users.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [users]
      summary: Create a user (super admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username: { type: string }
                password: { type: string, minLength: 8 }
                role:
                  type: string
                  enum: [super_admin, admin, user]
                display_name: { type: string }
                email: { type: string, format: email }
      responses:
        '201':
          description: Created user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
  /users/{id}:
    parameters: [{ $ref: '#/components/parameters/IdParam' }]
    put:
      tags: [users]
      summary: Update a user (super admin)
      description: Pass `current_password` to authorise password resets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: { type: string }
                email: { type: string, format: email }
                role: { type: string }
                password: { type: string, minLength: 8 }
                current_password: { type: string }
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
    delete:
      tags: [users]
      summary: Delete a user (super admin)
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }
  /users/{id}/access:
    parameters: [{ $ref: '#/components/parameters/IdParam' }]
    post:
      tags: [users]
      summary: Grant a user access to an app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_slug]
              properties:
                app_slug: { type: string }
      responses:
        '200':
          description: Granted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }
  /users/{id}/access/{slug}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
      - $ref: '#/components/parameters/AppSlug'
    delete:
      tags: [users]
      summary: Revoke a user's access to an app
      responses:
        '200':
          description: Revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }

  /me:
    get:
      tags: [profile]
      summary: Get the current user's profile
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
    put:
      tags: [profile]
      summary: Update the current user's display name and email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: { type: string }
                email: { type: string, format: email }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }
  /me/password:
    put:
      tags: [profile]
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }

  /apikeys:
    get:
      tags: [apikeys]
      summary: List the current user's API keys
      responses:
        '200':
          description: Keys (without secrets).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ApiKey' }
    post:
      tags: [apikeys]
      summary: Create a new API key (returned ONCE, store it now)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201':
          description: Created. The plaintext `key` is only returned here.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiKey'
                  - type: object
                    properties:
                      key: { type: string, example: 'sd_xxx' }
  /apikeys/{id}:
    parameters: [{ $ref: '#/components/parameters/IdParam' }]
    delete:
      tags: [apikeys]
      summary: Revoke an API key
      responses:
        '200':
          description: Revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusOk' }
        '404': { $ref: '#/components/responses/NotFound' }

  /metrics/system:
    get:
      tags: [metrics]
      summary: Host CPU, memory, and disk metrics
      parameters:
        - $ref: '#/components/parameters/SinceParam'
      responses:
        '200':
          description: Metric points.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MetricsPoint' }
  /apps/{slug}/metrics:
    parameters:
      - $ref: '#/components/parameters/AppSlug'
      - $ref: '#/components/parameters/SinceParam'
    get:
      tags: [metrics]
      summary: Per-app container metrics
      responses:
        '200':
          description: Metric points.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MetricsPoint' }
  /apps/{slug}/requests:
    parameters:
      - $ref: '#/components/parameters/AppSlug'
      - $ref: '#/components/parameters/SinceParam'
    get:
      tags: [metrics]
      summary: HTTP request stats for an app's endpoints
      responses:
        '200':
          description: Request stat rows.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RequestStat' }

  /apps/{slug}/deploy-logs:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    get:
      tags: [logs]
      summary: WebSocket stream of deploy progress
      description: |
        Upgrades to a WebSocket. Server pushes JSON frames as `docker compose`
        runs. See the WebSocket reference for the message shape.
      responses:
        '101': { description: Switching protocols. }
  /apps/{slug}/logs:
    parameters: [{ $ref: '#/components/parameters/AppSlug' }]
    get:
      tags: [logs]
      summary: WebSocket stream of container logs
      description: |
        Upgrades to a WebSocket. Server pushes JSON frames per stdout/stderr line
        for the app's services. See the WebSocket reference.
      responses:
        '101': { description: Switching protocols. }

  /apps/{slug}/backups/configs:
