root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = ["serve", "--config", "config.dev.yaml"]
  entrypoint = "bin/simpledeploy"
  cmd = "go build -ldflags=\"-s -w -X main.version=dev -X main.commit=local -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)\" -o bin/simpledeploy ./cmd/simpledeploy"
  delay = 1000
  exclude_dir = ["assets", "ui", "tmp", "testdata"]
  exclude_extensions = ["so", "o", "gcno"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  full_bin = ""
  include_dir = ["cmd", "internal"]
  include_extensions = ["go", "tpl", "tmpl", "html", "css", "yaml"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
