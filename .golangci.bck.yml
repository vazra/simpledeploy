# Pinned to v1 schema. CI uses golangci/golangci-lint-action@v6 with a
# matching pinned version in .github/workflows/ci.yml.

run:
  timeout: 5m

linters-settings:
  errcheck:
    # Benign ignores that litter the codebase. Suppressing these here
    # concentrates attention on real errcheck failures.
    exclude-functions:
      # Cobra CLI wiring: MarkFlagRequired only fails if the flag name
      # was mistyped, caught at first `simpledeploy --help`.
      - (*github.com/spf13/cobra.Command).MarkFlagRequired
      # http/json: end-of-request encoders; header already written, no
      # useful recovery path.
      - (*encoding/json.Encoder).Encode
      - (*encoding/json.Decoder).Decode
      # defer tx.Rollback after successful commit is a no-op by design.
      - (*database/sql.Tx).Rollback
      # bytes.Buffer.Write only returns a non-nil error from a too-large
      # slice, which cannot occur in production paths.
      - (*bytes.Buffer).Write
      # Standard lib decoders: error checked at a coarser level (e.g.
      # schema validation runs next), so redundant per-call checks add
      # noise without catching anything.
      - encoding/json.Unmarshal
      # cron/v3 AddFunc only errors on a bad spec string, validated at
      # config load time.
      - (*github.com/robfig/cron/v3.Cron).AddFunc
      # fmt.Fprintf on log/stdout paths.
      - fmt.Fprintf
      - fmt.Fprintln
      # http.ResponseWriter writes after headers: error is unrecoverable.
      - (net/http.ResponseWriter).Write
      # websocket best-effort writes/deadlines: connection is already being
      # torn down by the caller on failure.
      - (*github.com/gorilla/websocket.Conn).SetReadDeadline
      - (*github.com/gorilla/websocket.Conn).WriteJSON
      # filesystem prep: MkdirAll is idempotent; the subsequent write will
      # surface any real access issue.
      - os.MkdirAll
      # cleanup-on-shutdown paths. Error recovery is not meaningful.
      - (*os/exec.Cmd).Wait
      - (*net/http.Server).Shutdown
      # Intentional fire-and-forget store writes (deploy events, status
      # updates) from goroutines and scheduled tasks: the code path has
      # no caller to report back to. Real write failures surface via the
      # next read.
      - (*github.com/vazra/simpledeploy/internal/store.Store).CreateDeployEvent
      - (*github.com/vazra/simpledeploy/internal/store.Store).UpdateAppStatus
      - (*github.com/vazra/simpledeploy/internal/store.Store).CreateComposeVersion
      - (*github.com/vazra/simpledeploy/internal/store.Store).CreateDBBackupRun
      - (*github.com/vazra/simpledeploy/internal/store.Store).UpdateBackupRunFailed

issues:
  # Keep production code fully linted. Exclude noisy errcheck in tests
  # where failures would already surface via the test's own assertions
  # (json.Decode, store helpers, etc.) and are not safe to silently wrap.
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    # External SDK deprecations tracked separately; suppressing here keeps
    # CI green until the migration lands.
    - linters: [staticcheck]
      text: "SA1019.*BuildCachePruneOptions"
    - linters: [staticcheck]
      text: "SA1019.*(manager\\.NewUploader|uploader\\.Upload)"

linters:
  disable-all: false
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
