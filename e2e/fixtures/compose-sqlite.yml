services:
  web:
    image: nginx:alpine
    ports:
      - "8097:80"
    command: >
      sh -c "
      apk add --no-cache sqlite &&
      mkdir -p /data &&
      sqlite3 /data/test.db \"CREATE TABLE IF NOT EXISTS e2e_items(id INTEGER PRIMARY KEY, v TEXT);\" &&
      nginx -g 'daemon off;'
      "
    volumes:
      - sqlitedata:/data
    labels:
      simpledeploy.backup.strategy: "sqlite"
      simpledeploy.endpoints.0.port: "80"
      simpledeploy.endpoints.0.tls: "off"
volumes:
  sqlitedata:
