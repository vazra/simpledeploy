services:
  web:
    image: nginx:alpine
    ports:
      - "8093:80"
    command: sh -c "mkdir -p /data && echo 'initial' > /data/seed.txt && nginx -g 'daemon off;'"
    volumes:
      - voldata:/data
    labels:
      simpledeploy.endpoints.0.domain: "vol-test.local"
      simpledeploy.endpoints.0.port: "80"
      simpledeploy.endpoints.0.tls: "off"
volumes:
  voldata:
