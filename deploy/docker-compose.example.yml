# Production Docker install recipe.
# `network_mode: host` lets simpledeploy see container IPs directly via host
# routing, so it does not need to join the `simpledeploy-public` shared
# network (that's the Docker Desktop bridge-mode recipe's concern).
services:
  simpledeploy:
    image: ghcr.io/vazra/simpledeploy:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/simpledeploy:/etc/simpledeploy
      - /var/lib/simpledeploy:/var/lib/simpledeploy
