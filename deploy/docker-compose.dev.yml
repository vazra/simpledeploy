# Dev-only: run simpledeploy itself in a container on Docker Desktop
# (macOS/Windows). Works because the container joins simpledeploy-public and
# can reach apps via Docker DNS / bridge IPs, unlike a native host process on
# Docker Desktop.
#
# Start with `make dev-docker`. Stop any native simpledeploy on :443 first.
#
# Uses ${PWD}:${PWD} same-path bind mount so `docker compose -f <abs_path>`
# resolves identically on the host and inside the container.
services:
  simpledeploy:
    image: simpledeploy:dev
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: ${PWD}
    ports:
      - "80:80"
      - "443:443"
      - "8500:8500"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SIMPLEDEPLOY_UPSTREAM_HOST: host.docker.internal
      SIMPLEDEPLOY_HEALTH_PORT: "8500"
      SIMPLEDEPLOY_DEV_MODE: "1"
      # Match host HOME so ~ expansion in config.dev.yaml resolves to the
      # same path inside the container as on the host.
      HOME: ${HOME}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
      # Same-path bind mount so the container reads/writes the host's
      # ~/.simpledeploy-local-dev directly.
      - ${HOME}/.simpledeploy-local-dev:${HOME}/.simpledeploy-local-dev
    networks:
      - simpledeploy-public
    command: ["serve", "--config", "${PWD}/config.dev.yaml"]

networks:
  simpledeploy-public:
    external: true
    name: simpledeploy-public
