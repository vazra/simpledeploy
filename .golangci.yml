version: "2"
linters:
  settings:
    errcheck:
      exclude-functions:
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - (*database/sql.Tx).Rollback
        - (*bytes.Buffer).Write
        - encoding/json.Unmarshal
        - (*github.com/robfig/cron/v3.Cron).AddFunc
        - fmt.Fprintf
        - fmt.Fprintln
        - (net/http.ResponseWriter).Write
        - (*github.com/gorilla/websocket.Conn).SetReadDeadline
        - (*github.com/gorilla/websocket.Conn).WriteJSON
        - os.MkdirAll
        - (*os/exec.Cmd).Wait
        - (*net/http.Server).Shutdown
        - (*github.com/vazra/simpledeploy/internal/store.Store).CreateDeployEvent
        - (*github.com/vazra/simpledeploy/internal/store.Store).UpdateAppStatus
        - (*github.com/vazra/simpledeploy/internal/store.Store).CreateComposeVersion
        - (*github.com/vazra/simpledeploy/internal/store.Store).CreateDBBackupRun
        - (*github.com/vazra/simpledeploy/internal/store.Store).UpdateBackupRunFailed
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - staticcheck
        text: SA1019.*BuildCachePruneOptions
      - linters:
          - staticcheck
        text: SA1019.*(manager\.NewUploader|uploader\.Upload)
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
